<!DOCTYPE html>
<html>
<head>
    <title>WebGIS PBB-P2</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Inisialisasi map
var map = L.map('map').setView([-6.2, 106.8], 13);

// Basemap OSM
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// Load GeoJSON
fetch('webgis')
.then(response => response.json())
.then(data => {

    var geojsonLayer = L.geoJSON(data, {
        onEachFeature: function (feature, layer) {
            let props = feature.properties;

            let popupContent = `
                <b>ID:</b> ${props.IDOBJEKPAJ || '-'}<br>
                <b>Luas Tanah:</b> ${props.LUAS_TANAH || '-'}<br>
                <b>Luas Bangunan:</b> ${props.LUAS_BANGUNAN || '-'}<br>
                <b>Ratio:</b> ${props.RATIO_LUASBANGUNAN_LUASTANAH || '-'}
            `;

            layer.bindPopup(popupContent);
        }
    }).addTo(map);

    // Zoom ke layer
    map.fitBounds(geojsonLayer.getBounds());
});
</script>

</body>
</html>
